# ═══════════════════════════════════════════════════════════════
# azure-pipelines.yml – COMPLETE CI + CD Multi-Stage Pipeline
# Electronic Arts | Space Defender Gaming App
#
# ✅ NO CLASSIC RELEASE PIPELINE NEEDED
#    This single YAML file handles both:
#    Stage 1 → Build Docker image & Push to ACR  (CI)
#    Stage 2 → Deploy to Azure App Service        (CD)
#
# TRIGGER: Auto-runs on every push to 'main' branch
# ═══════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - docs/**

# ── Variables ──────────────────────────────────────────────────
variables:
  # --- Azure Container Registry ---
  acrName:        'plpro1'                    # Your ACR name
  acrLoginServer: '$(acrName).azurecr.io'    # plpro1.azurecr.io

  # --- Docker Registry Service Connection ---
  dockerRegistryServiceConnection: 'plpro1'  # Your Docker service connection

  # --- Docker Image ---
  imageName:  'space-defender'
  imageTag:   '$(Build.BuildId)'
  latestTag:  'latest'

  # --- Azure App Service ---
  # ✏️ UPDATE appServiceName once you create it in Azure Portal
  appServiceName:    'space-defender-app'     # The App Service name you create
  resourceGroup:     'PLPROJECTS'
  azureSubscription: 'ARM'                    # Your Azure RM service connection

  # --- Agent ---
  vmImageName: 'ubuntu-latest'

# ═══════════════════════════════════════════════════════════════
# STAGE 1 — CI: BUILD & PUSH DOCKER IMAGE
# ═══════════════════════════════════════════════════════════════
stages:

- stage: Build
  displayName: '🏗️ Stage 1 — Build & Push Docker Image'
  jobs:

  - job: BuildAndPush
    displayName: 'Build Docker Image & Push to ACR'
    pool:
      vmImage: $(vmImageName)

    steps:

    # ── Step 1: Checkout code from GitHub ──────────────────────
    - checkout: self
      displayName: '📥 Checkout Source Code from GitHub'
      clean: true

    # ── Step 2: Print build info ────────────────────────────────
    - script: |
        echo "======================================================"
        echo "  Electronic Arts – Space Defender CI/CD Pipeline"
        echo "======================================================"
        echo "  Build ID   : $(Build.BuildId)"
        echo "  Branch     : $(Build.SourceBranchName)"
        echo "  Commit     : $(Build.SourceVersion)"
        echo "  Image      : $(acrLoginServer)/$(imageName):$(imageTag)"
        echo "======================================================"
      displayName: '📋 Print Build Info'

    # ── Step 3: Build AND Push Docker image in one step ────────
    # Using buildAndPush avoids the "image not found locally" error
    - task: Docker@2
      displayName: '🐳 Build & Push Docker Image to ACR'
      inputs:
        command:           buildAndPush
        repository:        '$(imageName)'
        containerRegistry: $(dockerRegistryServiceConnection)
        dockerfile:        '$(Build.SourcesDirectory)/Dockerfile'
        buildContext:      '$(Build.SourcesDirectory)'
        tags: |
          $(imageTag)
          $(latestTag)


    # ── Step 5: Publish image tag as pipeline variable ──────────
    - script: |
        mkdir -p $(Build.ArtifactStagingDirectory)/drop
        echo "$(imageTag)" > $(Build.ArtifactStagingDirectory)/drop/imageTag.txt
        echo '{ "acrLoginServer":"$(acrLoginServer)", "imageName":"$(imageName)", "imageTag":"$(imageTag)" }' \
          > $(Build.ArtifactStagingDirectory)/drop/image-info.json
        echo "✅ Artifact written:"
        cat $(Build.ArtifactStagingDirectory)/drop/image-info.json
      displayName: '📄 Write Image Metadata Artifact'

    - task: PublishBuildArtifacts@1
      displayName: '📤 Publish Artifact'
      inputs:
        pathToPublish:  '$(Build.ArtifactStagingDirectory)/drop'
        artifactName:   'drop'
        publishLocation: 'Container'

    - script: |
        echo ""
        echo "✅ BUILD STAGE COMPLETE"
        echo "   Image: $(acrLoginServer)/$(imageName):$(imageTag)"
        echo "   Image: $(acrLoginServer)/$(imageName):latest"
      displayName: '✅ Build Stage Summary'

# ═══════════════════════════════════════════════════════════════
# STAGE 2 — CD: DEPLOY TO AZURE CONTAINER APPS
# Runs automatically after Stage 1 succeeds
# ═══════════════════════════════════════════════════════════════

- stage: Deploy
  displayName: '🚀 Stage 2 — Deploy to Azure Container Apps'
  dependsOn: Build
  condition: succeeded()
  jobs:

  - deployment: DeployToContainerApp
    displayName: 'Deploy Container to Azure Container Apps'
    pool:
      vmImage: $(vmImageName)
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:

          # ── Step 1: Print deploy info ──────────────────────────
          - script: |
              echo "======================================================"
              echo "  Electronic Arts – Deploying Space Defender"
              echo "======================================================"
              echo "  Image         : $(acrLoginServer)/$(imageName):$(imageTag)"
              echo "  Container App : $(appServiceName)"
              echo "  Resource Group: $(resourceGroup)"
              echo "======================================================"
            displayName: '📋 Print Deploy Info'

          # ── Step 2: Install Container Apps CLI extension ───────
          - task: AzureCLI@2
            displayName: '🔧 Install Container Apps CLI Extension'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az extension add --name containerapp --upgrade -y
                echo "✅ Container Apps extension ready"

          # ── Step 3: Deploy new image to Container App ──────────
          - task: AzureCLI@2
            displayName: '🌐 Deploy Container → Azure Container Apps'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Deploying image: $(acrLoginServer)/$(imageName):$(imageTag)"
                az containerapp update \
                  --name $(appServiceName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrLoginServer)/$(imageName):$(imageTag)
                echo "✅ Container App updated successfully"

          # ── Step 4: Wait for deployment to complete ────────────
          - script: |
              echo "⏳ Waiting 30 seconds for Container App to start..."
              sleep 30
            displayName: '⏳ Wait for Container App Startup'

          # ── Step 5: Get URL and Smoke Test ─────────────────────
          - task: AzureCLI@2
            displayName: '🧪 Smoke Test — Verify App is Live'
            continueOnError: true
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                APP_URL=$(az containerapp show \
                  --name $(appServiceName) \
                  --resource-group $(resourceGroup) \
                  --query properties.configuration.ingress.fqdn \
                  --output tsv)
                echo "🌐 App URL: https://$APP_URL"
                HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP_URL" || echo "000")
                echo "HTTP Status: $HTTP_STATUS"
                if [ "$HTTP_STATUS" = "200" ]; then
                  echo "✅ SMOKE TEST PASSED — Game is live!"
                  echo "🎮 Play at: https://$APP_URL"
                else
                  echo "⚠️  Status $HTTP_STATUS — App may still be starting. Check manually."
                fi

          # ── Step 6: Deployment Summary ─────────────────────────
          - task: AzureCLI@2
            displayName: '🎉 Print Live App URL'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                APP_URL=$(az containerapp show \
                  --name $(appServiceName) \
                  --resource-group $(resourceGroup) \
                  --query properties.configuration.ingress.fqdn \
                  --output tsv)
                echo ""
                echo "╔══════════════════════════════════════════════════╗"
                echo "║  🎮  DEPLOYMENT COMPLETE!                        ║"
                echo "╠══════════════════════════════════════════════════╣"
                echo "║  Container App : $(appServiceName)               ║"
                echo "║  Image         : $(imageName):$(imageTag)        ║"
                echo "║  Build         : #$(Build.BuildId)               ║"
                echo "║  Live URL      : https://$APP_URL                ║"
                echo "╚══════════════════════════════════════════════════╝"


