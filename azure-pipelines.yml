# ═══════════════════════════════════════════════════════════════
# azure-pipelines.yml – COMPLETE CI + CD Multi-Stage Pipeline
# Electronic Arts | Space Defender Gaming App
#
# ✅ NO CLASSIC RELEASE PIPELINE NEEDED
#    This single YAML file handles both:
#    Stage 1 → Build Docker image & Push to ACR  (CI)
#    Stage 2 → Deploy to Azure App Service        (CD)
#
# TRIGGER: Auto-runs on every push to 'main' branch
# ═══════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - docs/**

# ── Variables ──────────────────────────────────────────────────
# ✏️  VERIFY / UPDATE the values below to match YOUR Azure DevOps setup
variables:
  # --- Azure Container Registry ---
  # ✏️ Replace with your actual ACR name (just the short name, no .azurecr.io)
  acrName:        'easpacegameacr'
  acrLoginServer: '$(acrName).azurecr.io'

  # ✏️ IMPORTANT: Use EXACTLY one of your two Docker service connection names:
  #    Option A → 'ACR Devops'   (try this first)
  #    Option B → 'plpro1'       (use this if Option A fails)
  dockerRegistryServiceConnection: 'ACR Devops'

  # --- Docker Image ---
  imageName:  'space-defender'
  imageTag:   '$(Build.BuildId)'
  latestTag:  'latest'

  # --- Azure App Service ---
  # ✏️ Replace with your actual App Service name (from Azure Portal)
  appServiceName: 'space-defender-webapp'
  # ✏️ Replace with your actual Resource Group name
  resourceGroup:  'EA-SpaceDefender-RG'
  # ✏️ Replace with your Azure Resource Manager service connection name
  #    (Project Settings → Service connections → type: Azure Resource Manager)
  azureSubscription: 'Azure-ServiceConnection'

  # --- Agent ---
  vmImageName: 'ubuntu-latest'

# ═══════════════════════════════════════════════════════════════
# STAGE 1 — CI: BUILD & PUSH DOCKER IMAGE
# ═══════════════════════════════════════════════════════════════
stages:

- stage: Build
  displayName: '🏗️ Stage 1 — Build & Push Docker Image'
  jobs:

  - job: BuildAndPush
    displayName: 'Build Docker Image & Push to ACR'
    pool:
      vmImage: $(vmImageName)

    steps:

    # ── Step 1: Checkout code from GitHub ──────────────────────
    - checkout: self
      displayName: '📥 Checkout Source Code from GitHub'
      clean: true

    # ── Step 2: Print build info ────────────────────────────────
    - script: |
        echo "======================================================"
        echo "  Electronic Arts – Space Defender CI/CD Pipeline"
        echo "======================================================"
        echo "  Build ID   : $(Build.BuildId)"
        echo "  Branch     : $(Build.SourceBranchName)"
        echo "  Commit     : $(Build.SourceVersion)"
        echo "  Image      : $(acrLoginServer)/$(imageName):$(imageTag)"
        echo "======================================================"
      displayName: '📋 Print Build Info'

    # ── Step 3: Build Docker image ──────────────────────────────
    - task: Docker@2
      displayName: '🐳 Build Docker Image'
      inputs:
        command:      build
        repository:   '$(acrLoginServer)/$(imageName)'
        dockerfile:   '$(Build.SourcesDirectory)/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          $(imageTag)
          $(latestTag)
        arguments: '--no-cache --pull'

    # ── Step 4: Push image to ACR ───────────────────────────────
    - task: Docker@2
      displayName: '📦 Push Image to Azure Container Registry'
      inputs:
        command:           push
        repository:        '$(acrLoginServer)/$(imageName)'
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(imageTag)
          $(latestTag)

    # ── Step 5: Publish image tag as pipeline variable ──────────
    - script: |
        mkdir -p $(Build.ArtifactStagingDirectory)/drop
        echo "$(imageTag)" > $(Build.ArtifactStagingDirectory)/drop/imageTag.txt
        echo '{ "acrLoginServer":"$(acrLoginServer)", "imageName":"$(imageName)", "imageTag":"$(imageTag)" }' \
          > $(Build.ArtifactStagingDirectory)/drop/image-info.json
        echo "✅ Artifact written:"
        cat $(Build.ArtifactStagingDirectory)/drop/image-info.json
      displayName: '📄 Write Image Metadata Artifact'

    - task: PublishBuildArtifacts@1
      displayName: '📤 Publish Artifact'
      inputs:
        pathToPublish:  '$(Build.ArtifactStagingDirectory)/drop'
        artifactName:   'drop'
        publishLocation: 'Container'

    - script: |
        echo ""
        echo "✅ BUILD STAGE COMPLETE"
        echo "   Image: $(acrLoginServer)/$(imageName):$(imageTag)"
        echo "   Image: $(acrLoginServer)/$(imageName):latest"
      displayName: '✅ Build Stage Summary'

# ═══════════════════════════════════════════════════════════════
# STAGE 2 — CD: DEPLOY TO AZURE APP SERVICE
# Runs automatically after Stage 1 succeeds
# ═══════════════════════════════════════════════════════════════

- stage: Deploy
  displayName: '🚀 Stage 2 — Deploy to Azure App Service'
  dependsOn: Build
  condition: succeeded()
  jobs:

  - deployment: DeployToAppService
    displayName: 'Deploy Container to Azure App Service'
    pool:
      vmImage: $(vmImageName)
    environment: 'Production'    # Creates a named environment (allows manual approval gates)
    strategy:
      runOnce:
        deploy:
          steps:

          # ── Step 1: Print deploy info ──────────────────────────
          - script: |
              echo "======================================================"
              echo "  Electronic Arts – Deploying Space Defender"
              echo "======================================================"
              echo "  Image      : $(acrLoginServer)/$(imageName):$(imageTag)"
              echo "  App Service: $(appServiceName)"
              echo "  Res. Group : $(resourceGroup)"
              echo "======================================================"
            displayName: '📋 Print Deploy Info'

          # ── Step 2: Deploy container image to App Service ──────
          - task: AzureWebAppContainer@1
            displayName: '🌐 Deploy Container → Azure App Service'
            inputs:
              azureSubscription: $(azureSubscription)
              appName:           $(appServiceName)
              containers:        '$(acrLoginServer)/$(imageName):$(imageTag)'

          # ── Step 3: Set App Service environment variables ──────
          - task: AzureCLI@2
            displayName: '⚙️ Configure App Service Settings'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp config appsettings set \
                  --name $(appServiceName) \
                  --resource-group $(resourceGroup) \
                  --settings \
                    WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
                    DOCKER_REGISTRY_SERVER_URL=https://$(acrLoginServer) \
                    BUILD_ID=$(Build.BuildId) \
                    DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                echo "✅ App settings updated"

          # ── Step 4: Restart App Service ─────────────────────
          - task: AzureCLI@2
            displayName: '🔄 Restart App Service'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp restart \
                  --name $(appServiceName) \
                  --resource-group $(resourceGroup)
                echo "✅ App Service restarted"

          # ── Step 5: Wait for startup ─────────────────────────
          - script: |
              echo "⏳ Waiting 30 seconds for App Service to start..."
              sleep 30
            displayName: '⏳ Wait for App Service Startup'

          # ── Step 6: Smoke test ──────────────────────────────
          - task: AzureCLI@2
            displayName: '🧪 HTTP Smoke Test'
            continueOnError: true
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                APP_URL=$(az webapp show \
                  --name $(appServiceName) \
                  --resource-group $(resourceGroup) \
                  --query defaultHostName \
                  --output tsv)
                echo "Testing: https://$APP_URL"
                HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP_URL" || echo "000")
                echo "HTTP Status: $HTTP_STATUS"
                if [ "$HTTP_STATUS" = "200" ]; then
                  echo "✅ SMOKE TEST PASSED — App is live!"
                  echo "🌐 URL: https://$APP_URL"
                else
                  echo "⚠️  Status $HTTP_STATUS — check app manually."
                fi

          # ── Step 7: Final summary ────────────────────────────
          - script: |
              echo ""
              echo "╔══════════════════════════════════════════════╗"
              echo "║  🎮  DEPLOYMENT COMPLETE!                    ║"
              echo "╠══════════════════════════════════════════════╣"
              echo "║  App    : $(appServiceName)                  ║"
              echo "║  Image  : $(imageName):$(imageTag)           ║"
              echo "║  Build  : #$(Build.BuildId)                  ║"
              echo "╚══════════════════════════════════════════════╝"
            displayName: '🎉 Deployment Complete'
